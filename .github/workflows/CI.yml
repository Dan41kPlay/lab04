name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6

    - name: project_configure
      run: cmake ${{github.workspace}} -B ${{github.workspace}}/build

    - name: project_build
      run: cmake --build ${{github.workspace}}/build

    - name: hello_world_test
      shell: bash
      run: |
        if [ "${{matrix.os}}" = "windows-latest" ]; then ./build/hello_world_application/Debug/hello_world.exe
        else ./build/hello_world_application/hello_world
        fi

    - name: solver_test
      shell: bash
      run: |
        if [ "${{matrix.os}}" = "windows-latest" ]; then echo "1 -5 6" | ./build/solver_application/Debug/solver.exe
        else echo "1 -5 6" | ./build/solver_application/solver
        fi
